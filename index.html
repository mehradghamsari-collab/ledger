<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#ECECEF" />
<title>Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --porcelain:#ECECEF; --snow:#FFFFFF; --ink:#14161C; --slate:#767B85; --slate-2:#9AA0AB;
    --hairline:#E4E4E8; --in:#18A999; --out:#F26D5B; --in-soft:#E6F5F2; --out-soft:#FDEBE8;
    --shadow:0 1px 2px rgba(20,22,28,.04), 0 8px 24px rgba(20,22,28,.06);
    --shadow-card:0 10px 30px rgba(17,21,32,.28), 0 2px 8px rgba(17,21,32,.18);
    --r:22px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--porcelain);color:var(--ink);-webkit-font-smoothing:antialiased;}
  .app{max-width:440px;margin:0 auto;min-height:100vh;background:var(--porcelain);position:relative;padding-bottom:calc(100px + env(safe-area-inset-bottom));}
  .num{font-variant-numeric:tabular-nums;}
  .sg{font-family:'Space Grotesk';}

  /* topbar */
  .topbar{position:sticky;top:0;z-index:30;padding:calc(14px + env(safe-area-inset-top)) 18px 14px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(var(--porcelain) 72%, rgba(236,236,239,0));}
  .greet-eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--slate-2);font-weight:600;}
  .greet-name{font-family:'Space Grotesk';font-size:21px;font-weight:600;letter-spacing:-.01em;margin-top:1px;}
  .tb-actions{display:flex;gap:10px;}
  .icon-btn{width:42px;height:42px;border-radius:50%;background:var(--snow);border:1px solid var(--hairline);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;box-shadow:var(--shadow);transition:transform .18s;color:var(--ink);}
  .icon-btn:active{transform:scale(.92);}
  .icon-btn.dark{background:var(--ink);color:#fff;border-color:var(--ink);}
  .icon-btn .dot{position:absolute;top:9px;right:10px;width:8px;height:8px;border-radius:50%;background:var(--out);border:2px solid var(--snow);}

  .view{padding:0 16px;animation:viewIn .4s cubic-bezier(.22,1,.36,1);}
  .view.hidden{display:none;}
  @keyframes viewIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--slate-2);font-weight:600;margin:24px 6px 12px;}
  .card{background:var(--snow);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;}
  .stagger{opacity:0;transform:translateY(14px);animation:rise .55s cubic-bezier(.22,1,.36,1) forwards;}
  @keyframes rise{to{opacity:1;transform:none;}}

  /* hero */
  .hero{margin:4px 4px 0;border-radius:26px;color:#fff;padding:24px;background:radial-gradient(120% 120% at 85% 0%, #2A3142 0%, #1B1F2A 55%, #14161C 100%);box-shadow:var(--shadow-card);position:relative;overflow:hidden;}
  .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(115deg, transparent 38%, rgba(255,221,160,.10) 50%, transparent 62%);transform:translateX(-30%);animation:sheen 7s ease-in-out infinite;pointer-events:none;}
  @keyframes sheen{0%,100%{transform:translateX(-40%);}50%{transform:translateX(40%);}}
  .hero-label{font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.55);font-weight:600;}
  .hero-balance{font-family:'Space Grotesk';font-size:40px;font-weight:600;letter-spacing:-.02em;margin-top:7px;line-height:1;}
  .hero-row{display:flex;gap:10px;margin-top:20px;}
  .hero-chip{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:11px 13px;}
  .hero-chip .lbl{font-size:11px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:5px;font-weight:500;}
  .hero-chip .val{font-family:'Space Grotesk';font-size:18px;font-weight:600;margin-top:3px;}

  .flow-bar{height:10px;border-radius:6px;background:var(--out-soft);overflow:hidden;}
  .flow-bar .seg-in{background:var(--in);height:100%;width:0;transition:width 1s cubic-bezier(.22,1,.36,1);}
  .legend-flow{display:flex;justify-content:space-between;margin-top:14px;}
  .lf .t{font-size:11px;color:var(--slate);display:flex;align-items:center;gap:6px;}
  .lf .v{font-family:'Space Grotesk';font-size:17px;font-weight:600;margin-top:2px;}
  .swatch{width:9px;height:9px;border-radius:3px;display:inline-block;}
  .net-pill{display:inline-flex;align-items:center;gap:6px;font-weight:600;font-size:13px;padding:6px 12px;border-radius:30px;}

  .donut-wrap{position:relative;height:184px;}
  .donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
  .donut-center .c-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--slate-2);font-weight:600;}
  .donut-center .c-val{font-family:'Space Grotesk';font-size:25px;font-weight:600;margin-top:2px;}

  .row{display:flex;align-items:center;gap:12px;padding:12px 4px;border-top:1px solid var(--hairline);}
  .row:first-child{border-top:none;}
  .ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .ico svg{width:19px;height:19px;}
  .row .name{font-weight:600;font-size:14px;flex:1;min-width:0;}
  .row .name .sub{font-size:12px;color:var(--slate);font-weight:500;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .amt{font-family:'Space Grotesk';font-weight:600;font-size:15px;flex-shrink:0;}
  .amt.in{color:var(--in);}
  .chip-tag{font-size:11px;color:var(--slate);font-weight:500;}

  .bar-row{padding:13px 2px;border-top:1px solid var(--hairline);}
  .bar-row:first-child{border-top:none;}
  .bar-head{display:flex;align-items:center;gap:11px;margin-bottom:9px;}
  .bar-head .nm{font-weight:600;font-size:14px;flex:1;}
  .bar-head .am{font-family:'Space Grotesk';font-weight:600;font-size:14px;}
  .bar-track{height:8px;border-radius:5px;background:var(--porcelain);overflow:hidden;}
  .bar-fill{height:100%;border-radius:5px;width:0;transition:width .9s cubic-bezier(.22,1,.36,1);}
  .chart-box{height:170px;position:relative;}

  /* calendar */
  .cal-head{display:flex;align-items:baseline;justify-content:space-between;margin:2px 6px 14px;}
  .cal-month{font-family:'Space Grotesk';font-size:22px;font-weight:600;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
  .cal-dow{text-align:center;font-size:10.5px;color:var(--slate-2);font-weight:600;padding-bottom:6px;text-transform:uppercase;}
  .cal-cell{aspect-ratio:1;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;position:relative;}
  .cal-cell.muted{color:var(--slate-2);opacity:.4;}
  .cal-cell.today{background:var(--ink);color:#fff;font-weight:600;}
  .cal-dd{width:5px;height:5px;border-radius:50%;position:absolute;bottom:7px;background:var(--out);}
  .cal-cell.today .cal-dd{background:#fff;}

  /* nav */
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:40;max-width:440px;margin:0 auto;background:rgba(255,255,255,.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--hairline);display:flex;justify-content:space-around;padding:10px 8px calc(10px + env(safe-area-inset-bottom));}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--slate-2);font-family:inherit;padding:4px 14px;border-radius:14px;transition:color .2s;}
  .nav-item svg{width:23px;height:23px;}
  .nav-item .lbl{font-size:10.5px;font-weight:600;}
  .nav-item.on{color:var(--ink);}

  /* sheets / modals */
  .scrim{position:fixed;inset:0;background:rgba(20,22,28,.45);z-index:50;opacity:0;pointer-events:none;transition:opacity .28s;}
  .scrim.show{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:55;max-width:440px;margin:0 auto;background:var(--snow);border-radius:26px 26px 0 0;transform:translateY(100%);transition:transform .38s cubic-bezier(.22,1,.36,1);padding:20px 18px calc(22px + env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto;}
  .sheet.show{transform:none;}
  .sheet h2{font-family:'Space Grotesk';font-size:21px;font-weight:600;margin:0 0 4px;}
  .sheet .sub{font-size:13px;color:var(--slate);margin:0 0 18px;}
  .grab{width:38px;height:4px;border-radius:3px;background:var(--hairline);margin:0 auto 16px;}
  label.fl{display:block;font-size:12px;font-weight:600;color:var(--slate);margin:14px 2px 6px;text-transform:uppercase;letter-spacing:.06em;}
  .field{width:100%;border:1px solid var(--hairline);border-radius:13px;padding:13px 14px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);}
  .field:focus{outline:2px solid var(--ink);border-color:transparent;}
  select.field{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23767B85' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:38px;}
  .btn{width:100%;border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:600;font-family:inherit;background:var(--ink);color:#fff;cursor:pointer;transition:transform .15s;margin-top:18px;}
  .btn:active{transform:scale(.98);}
  .btn.ghost{background:var(--porcelain);color:var(--ink);margin-top:10px;}
  .btn.danger{background:var(--out-soft);color:#C0392B;}
  .seg{display:flex;gap:8px;margin-top:6px;}
  .seg button{flex:1;border:1px solid var(--hairline);background:#fff;border-radius:11px;padding:11px;font-family:inherit;font-size:13px;font-weight:600;color:var(--slate);cursor:pointer;}
  .seg button.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .catpick{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px;}
  .catpick button{border:1px solid var(--hairline);background:#fff;border-radius:12px;padding:10px 6px;font-family:inherit;font-size:12px;font-weight:600;color:var(--ink);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;}
  .catpick button.on{border-color:var(--ink);box-shadow:0 0 0 1.5px var(--ink) inset;}
  .catpick button svg{width:18px;height:18px;}
  .preview{background:var(--porcelain);border-radius:13px;padding:12px;font-size:12.5px;margin-top:12px;}
  .preview .pr{display:flex;justify-content:space-between;padding:4px 0;}
  .msg{font-size:13px;border-radius:12px;padding:11px 13px;margin-top:12px;line-height:1.45;}
  .msg.ok{background:var(--in-soft);color:#0E7A6E;}
  .msg.warn{background:#FFF6E5;color:#7A5B12;border:1px solid #F2D08A;}

  /* alerts panel */
  .panel{position:fixed;top:0;right:0;bottom:0;z-index:55;width:min(86%,380px);background:var(--porcelain);transform:translateX(100%);transition:transform .38s cubic-bezier(.22,1,.36,1);padding:calc(20px + env(safe-area-inset-top)) 18px 24px;overflow-y:auto;}
  .panel.show{transform:none;}
  .panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .panel-head h2{font-family:'Space Grotesk';font-size:20px;font-weight:600;margin:0;}
  .x{width:36px;height:36px;border-radius:50%;background:var(--snow);border:1px solid var(--hairline);display:flex;align-items:center;justify-content:center;cursor:pointer;}

  /* empty state */
  .empty{text-align:center;padding:50px 20px;}
  .empty .big{width:62px;height:62px;border-radius:18px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
  .empty .big svg{width:30px;height:30px;}
  .empty h2{font-family:'Space Grotesk';font-size:23px;font-weight:600;margin:0 0 6px;}
  .empty p{font-size:14px;color:var(--slate);line-height:1.5;margin:0 auto 22px;max-width:300px;}

  .delete-x{margin-left:auto;color:var(--slate-2);background:none;border:none;cursor:pointer;padding:6px;font-size:13px;}
  svg.ic{stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
  @media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important;}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <div class="greet-eyebrow" id="greetEyebrow">Welcome</div>
      <div class="greet-name" id="greetName">Ledger</div>
    </div>
    <div class="tb-actions">
      <button class="icon-btn" id="alertsBtn" aria-label="Alerts"><span class="dot" id="alertDot" style="display:none"></span><svg class="ic" width="20" height="20" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg></button>
      <button class="icon-btn" id="settingsBtn" aria-label="Settings"><svg class="ic" width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 0 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H3a2 2 0 0 1 0-4h.1A1.6 1.6 0 0 0 4.6 7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9.4A1.6 1.6 0 0 0 11 3.1V3a2 2 0 0 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9.4a1.6 1.6 0 0 0 1.4 1.6H21a2 2 0 0 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg></button>
      <button class="icon-btn dark" id="addBtn" aria-label="Add"><svg class="ic" width="22" height="22" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
    </div>
  </div>

  <section class="view" id="view-home"></section>
  <section class="view hidden" id="view-spending"></section>
  <section class="view hidden" id="view-calendar"></section>
  <section class="view hidden" id="view-activity"></section>

  <nav class="nav" id="nav">
    <button class="nav-item on" data-view="home"><svg class="ic" viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5"/><path d="M9.5 21v-6h5v6"/></svg><span class="lbl">Home</span></button>
    <button class="nav-item" data-view="spending"><svg class="ic" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 15l4-5 3 3 5-7"/></svg><span class="lbl">Spending</span></button>
    <button class="nav-item" data-view="calendar"><svg class="ic" viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg><span class="lbl">Calendar</span></button>
    <button class="nav-item" data-view="activity"><svg class="ic" viewBox="0 0 24 24"><path d="M3 12h4l2.5-7 5 14L17 12h4"/></svg><span class="lbl">Activity</span></button>
  </nav>
</div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"></div>

<aside class="panel" id="panel">
  <div class="panel-head"><h2>Alerts</h2><div class="x" id="closePanel"><svg class="ic" width="18" height="18" viewBox="0 0 24 24"><path d="M5 5l14 14M19 5L5 19"/></svg></div></div>
  <div id="alertList"></div>
</aside>

<script>
const RM = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const fmt = (n,d=2)=> (n<0?'−':'')+'£'+Math.abs(n).toLocaleString('en-GB',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmt0 = (n)=> (n<0?'−':'')+'£'+Math.abs(Math.round(n)).toLocaleString('en-GB');
const uid = ()=> Math.random().toString(36).slice(2,10);

/* ---------- categories ---------- */
const ACCENT={groceries:'#18A999',bills:'#8C7AE0',eating:'#F2A65A',shopping:'#E2748A',transport:'#6C8AE4',subs:'#4FB6C9',health:'#6FC18B',coffee:'#C08457',other:'#9AA0AB',income:'#18A999'};
const LABEL={groceries:'Groceries',bills:'Bills & utilities',eating:'Eating out',shopping:'Shopping',transport:'Transport',subs:'Subscriptions',health:'Health',coffee:'Coffee',other:'Other',income:'Income'};
const ICON={
  groceries:'<path d="M5 11l1-7h12l1 7"/><path d="M3 11h18l-1.4 8.2A2 2 0 0 1 17.6 21H6.4a2 2 0 0 1-2-1.8z"/><path d="M9.5 15v3M14.5 15v3"/>',
  eating:'<path d="M4 3v6a2 2 0 0 0 4 0V3M6 11v10"/><path d="M19 14V3a4 4 0 0 0-2.5 4c0 2 .5 3 .5 4v3M16.5 14v7"/>',
  shopping:'<path d="M6 2 4 6v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6l-2-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/>',
  transport:'<path d="M5 11l1.4-4.5A2 2 0 0 1 8.3 5h7.4a2 2 0 0 1 1.9 1.5L19 11"/><rect x="3" y="11" width="18" height="7" rx="2"/><circle cx="7.5" cy="18" r="1.4"/><circle cx="16.5" cy="18" r="1.4"/>',
  bills:'<path d="M5 2v20l2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1z"/><path d="M9 8h6M9 12h6M9 16h4"/>',
  subs:'<path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>',
  health:'<path d="M20.8 5.6a5.4 5.4 0 0 0-7.8 0L12 6.6l-1-1a5.4 5.4 0 1 0-7.7 7.7L12 22l8.7-8.7a5.4 5.4 0 0 0 .1-7.7z"/>',
  coffee:'<path d="M18 8h1a3.5 3.5 0 0 1 0 7h-1"/><path d="M2 8h16v8a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4z"/><path d="M6 1v3M10 1v3M14 1v3"/>',
  other:'<circle cx="6" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="18" cy="12" r="1.4"/>',
  income:'<path d="M12 19V5"/><path d="M5 12l7-7 7 7"/>'
};
const CATS=['groceries','bills','eating','shopping','transport','subs','health','coffee','other'];
const hexA=(hex,a)=>{const n=parseInt(hex.slice(1),16);return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;};
function icoBox(cat,sz){const c=ACCENT[cat]||ACCENT.other;return `<div class="ico" style="background:${hexA(c,.13)};color:${c}"><svg class="ic" viewBox="0 0 24 24" style="stroke-width:1.9">${ICON[cat]||ICON.other}</svg></div>`;}

const DEFAULT_RULES=[
  ['tesco','groceries'],['sainsbury','groceries'],['aldi','groceries'],['lidl','groceries'],['waitrose','groceries'],['asda','groceries'],['morrison','groceries'],['co-op','groceries'],['iceland','groceries'],['ocado','groceries'],
  ['pret','coffee'],['costa','coffee'],['starbucks','coffee'],['caffe nero','coffee'],['coffee','coffee'],
  ['deliveroo','eating'],['uber eats','eating'],['just eat','eating'],['mcdonald','eating'],['kfc','eating'],['nando','eating'],['pizza','eating'],['greggs','eating'],['restaurant','eating'],['cafe','eating'],['wagamama','eating'],
  ['uber','transport'],['tfl','transport'],['trainline','transport'],['train','transport'],['petrol','transport'],['shell','transport'],['esso','transport'],['parking','transport'],['railway','transport'],
  ['amazon','shopping'],['ebay','shopping'],['asos','shopping'],['uniqlo','shopping'],['zara','shopping'],['argos','shopping'],['john lewis','shopping'],['ikea','shopping'],['boots','health'],
  ['netflix','subs'],['spotify','subs'],['disney','subs'],['youtube','subs'],['prime','subs'],['icloud','subs'],['apple.com','subs'],['audible','subs'],
  ['puregym','health'],['gym','health'],['pharmacy','health'],['dental','health'],['nhs','health'],
  ['octopus','bills'],['british gas','bills'],['edf','bills'],['e.on','bills'],['thames water','bills'],['water','bills'],['council','bills'],['vodafone','bills'],['virgin media','bills'],['sky','bills'],['insurance','bills'],['aviva','bills'],['rent','bills'],['mortgage','bills'],['broadband','bills'],
];

/* ---------- storage (works with or without localStorage) ---------- */
const LS='ledger_v2';
let MEM=null;
function load(){ try{const r=localStorage.getItem(LS); if(r) return JSON.parse(r);}catch(e){} return MEM; }
function persist(){ try{localStorage.setItem(LS,JSON.stringify(state));}catch(e){} MEM=state; }
let state = load() || { name:'You', tx:[], rules:[], recurring:[] };

function categorize(t){
  if(t.amount>0) return 'income';
  if(t.cat) return t.cat;
  const d=(t.desc||'').toLowerCase();
  for(const r of state.rules){ if(r.pattern && d.includes(r.pattern.toLowerCase())) return r.category; }
  for(const [p,c] of DEFAULT_RULES){ if(d.includes(p)) return c; }
  return 'other';
}

/* ---------- aggregations ---------- */
const monthKey=(d)=> (d||'').slice(0,7);
function thisMonthKey(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');}
function lastMonths(n){const a=[];const d=new Date();d.setDate(1);for(let i=n-1;i>=0;i--){const x=new Date(d);x.setMonth(d.getMonth()-i);a.push({key:x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0'),label:x.toLocaleString('en-GB',{month:'short'})});}return a;}

function compute(){
  const tx=state.tx;
  const totalBalance=tx.reduce((s,t)=>s+t.amount,0);
  const accounts={};
  tx.forEach(t=>{const a=t.account||'Account';accounts[a]=(accounts[a]||0)+t.amount;});
  const mk=thisMonthKey();
  const month=tx.filter(t=>monthKey(t.date)===mk);
  const income=month.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
  const spend=month.filter(t=>t.amount<0).reduce((s,t)=>s-t.amount,0);
  const byCat={};
  month.filter(t=>t.amount<0).forEach(t=>{const c=categorize(t);byCat[c]=(byCat[c]||0)+(-t.amount);});
  const cats=Object.entries(byCat).map(([key,amt])=>({key,amt})).sort((a,b)=>b.amt-a.amt);
  const months=lastMonths(6);
  const inSeries=months.map(m=>tx.filter(t=>monthKey(t.date)===m.key&&t.amount>0).reduce((s,t)=>s+t.amount,0));
  const outSeries=months.map(m=>tx.filter(t=>monthKey(t.date)===m.key&&t.amount<0).reduce((s,t)=>s-t.amount,0));
  // balance trend: walk backward from current total
  let run=totalBalance;const balByMonth=[];
  for(let i=months.length-1;i>=0;i--){balByMonth[i]=run;run-=(inSeries[i]-outSeries[i]);}
  return {totalBalance,accounts,income,spend,net:income-spend,cats,spendTotal:spend,months,inSeries,outSeries,balByMonth};
}

/* recurring detection: outgoing descriptions appearing in >=2 distinct months */
function detectRecurring(){
  const tx=state.tx.filter(t=>t.amount<0);
  const groups={};
  tx.forEach(t=>{const key=(t.desc||'').toLowerCase().replace(/[0-9]/g,'').trim().slice(0,24);if(!key)return;(groups[key]=groups[key]||[]).push(t);});
  const out=[];
  Object.values(groups).forEach(g=>{
    const months=new Set(g.map(t=>monthKey(t.date)));
    if(months.size>=2){
      const amt=Math.abs(g.reduce((s,t)=>s+t.amount,0)/g.length);
      const day=Math.round(g.reduce((s,t)=>s+(new Date(t.date).getDate()||1),0)/g.length);
      out.push({name:g[0].desc,amt,day:Math.min(28,Math.max(1,day)),cat:categorize(g[0]),account:g[0].account||''});
    }
  });
  // include any manually-added recurring
  state.recurring.forEach(r=>out.push({...r}));
  return out.sort((a,b)=>a.day-b.day);
}

  openSheet(`<h2>Add recurring bill</h2><p class="sub">Shows on your calendar each month.</p>
    <label class="fl">Name</label><input class="field" id="rName" placeholder="e.g. Netflix">
    <label class="fl">Amount (£)</label><input class="field" id="rAmt" type="number" step="0.01" inputmode="decimal" placeholder="0.00">
    <label class="fl">Day of month</label><input class="field" id="rDay" type="number" min="1" max="28" placeholder="1–28">
    <label class="fl">Account</label><input class="field" id="rAcct" placeholder="e.g. Lloyds">
    <button class="btn" id="rSave">Add bill</button>`);
  document.getElementById('rSave').addEventListener('click',()=>{

/* ---------- CSV import ---------- */
function parseCSV(text){
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){if(ch==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=ch;}
    else{if(ch==='"')q=true;else if(ch===','){row.push(cur);cur='';}else if(ch==='\n'||ch==='\r'){if(ch==='\r'&&text[i+1]==='\n')i++;if(cur!==''||row.length){row.push(cur);rows.push(row);row=[];cur='';}}else cur+=ch;}
  }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows.filter(r=>r.some(c=>c.trim()!==''));
}
const guess=(headers,opts)=>{for(let i=0;i<headers.length;i++){const h=headers[i].toLowerCase();if(opts.some(o=>h.includes(o)))return i;}return -1;};
const parseAmt=(s)=>{if(s==null)return NaN;const n=parseFloat(String(s).replace(/[£$,\s]/g,'').replace(/[()]/g,m=>m==='('?'-':''));return n;};

function openImportSheet(){
  openSheet(`<h2>Import a statement</h2><p class="sub">Export a CSV from your bank app (Monzo, Revolut, Lloyds, etc.) and choose the file, or paste the contents.</p>
    <input type="file" accept=".csv,text/csv" id="csvFile" class="field" style="padding:11px">
    <label class="fl">…or paste CSV text</label><textarea class="field" id="csvText" rows="4" placeholder="Date,Description,Amount&#10;2026-06-01,Tesco,-12.50"></textarea>
    <button class="btn" id="csvParse">Continue</button>`);
  document.getElementById('csvFile').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{document.getElementById('csvText').value=rd.result;};rd.readAsText(f);});
  document.getElementById('csvParse').addEventListener('click',()=>{
    const txt=document.getElementById('csvText').value.trim();if(!txt){alert('Choose a file or paste CSV text first.');return;}
    const rows=parseCSV(txt);if(rows.length<2){alert('Could not read any rows from that CSV.');return;}
    importMap(rows);
  });
}
function importMap(rows){
  const headers=rows[0];const body=rows.slice(1);
  const gDate=guess(headers,['date','completed','time']);
  const gDesc=guess(headers,['description','name','reference','details','merchant','payee','narrative','memo']);
  const gAmt=guess(headers,['amount','value']);
  const gIn=guess(headers,['paid in','money in','credit','received']);
  const gOut=guess(headers,['paid out','money out','debit','spent']);
  const opt=(sel)=>headers.map((h,i)=>`<option value="${i}" ${i===sel?'selected':''}>${h||('Column '+(i+1))}</option>`).join('');
  const mode=(gIn>=0&&gOut>=0)?'split':'single';
  openSheet(`<h2>Match the columns</h2><p class="sub">${body.length} rows found. Tell me which column is which.</p>
    <label class="fl">Date</label><select class="field" id="mDate">${opt(gDate)}</select>
    <label class="fl">Description</label><select class="field" id="mDesc">${opt(gDesc)}</select>
    <label class="fl">Amount format</label>
    <div class="seg"><button data-mode="single" class="${mode==='single'?'on':''}">One amount column</button><button data-mode="split" class="${mode==='split'?'on':''}">Separate in / out</button></div>
    <div id="single" style="${mode==='split'?'display:none':''}"><label class="fl">Amount column</label><select class="field" id="mAmt">${opt(gAmt>=0?gAmt:0)}</select><p style="font-size:12px;color:var(--slate);margin:8px 2px 0">If your bank shows spend without a minus sign, tick below.</p><label style="display:flex;gap:8px;align-items:center;margin-top:8px;font-size:14px"><input type="checkbox" id="mFlip"> This column shows spending as positive</label></div>
    <div id="split" style="${mode==='single'?'display:none':''}"><label class="fl">Money in column</label><select class="field" id="mIn">${opt(gIn>=0?gIn:0)}</select><label class="fl">Money out column</label><select class="field" id="mOut">${opt(gOut>=0?gOut:0)}</select></div>
    <label class="fl">Account name for this import</label><input class="field" id="mAcct" placeholder="e.g. Monzo" value="">
    <div id="impPreview"></div>
    <button class="btn" id="impDo">Import transactions</button>`);
  let curMode=mode;
  const upd=()=>{
    const di=+document.getElementById('mDate').value,de=+document.getElementById('mDesc').value;
    const rowsP=body.slice(0,3).map(r=>{
      let amt;if(curMode==='split'){amt=(parseAmt(r[+document.getElementById('mIn').value])||0)-(parseAmt(r[+document.getElementById('mOut').value])||0);}else{amt=parseAmt(r[+document.getElementById('mAmt').value])||0;if(document.getElementById('mFlip').checked)amt=-amt;}
      return {date:r[di],desc:r[de],amt};
    });
    document.getElementById('impPreview').innerHTML='<div class="preview">'+rowsP.map(p=>`<div class="pr"><span>${(p.desc||'—').slice(0,22)}</span><span class="num" style="color:${p.amt<0?'var(--out)':'var(--in)'}">${fmt(p.amt)}</span></div>`).join('')+'<div style="font-size:11px;color:var(--slate);margin-top:6px">Preview of first 3 rows</div></div>';
  };
  sheet.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click',()=>{curMode=b.dataset.mode;sheet.querySelectorAll('[data-mode]').forEach(x=>x.classList.toggle('on',x===b));document.getElementById('single').style.display=curMode==='split'?'none':'';document.getElementById('split').style.display=curMode==='single'?'none':'';upd();}));
  ['mDate','mDesc','mAmt','mIn','mOut','mFlip'].forEach(id=>{const e=document.getElementById(id);if(e)e.addEventListener('change',upd);});
  upd();
  document.getElementById('impDo').addEventListener('click',()=>{
    const di=+document.getElementById('mDate').value,de=+document.getElementById('mDesc').value;
    const acct=document.getElementById('mAcct').value.trim()||'Imported';
    let added=0,skipped=0;
    body.forEach(r=>{
      let amt;if(curMode==='split'){amt=(parseAmt(r[+document.getElementById('mIn').value])||0)-(parseAmt(r[+document.getElementById('mOut').value])||0);}else{amt=parseAmt(r[+document.getElementById('mAmt').value])||0;if(document.getElementById('mFlip').checked)amt=-amt;}
      if(!amt||isNaN(amt)){skipped++;return;}
      let date=normDate(r[di]);
      const desc=(r[de]||'Transaction').trim();
      const key=date+'|'+amt.toFixed(2)+'|'+desc.toLowerCase();
      if(state.tx.some(t=>(t.date+'|'+t.amount.toFixed(2)+'|'+(t.desc||'').toLowerCase())===key)){skipped++;return;}
      state.tx.push({id:uid(),date,desc,account:acct,amount:amt,cat:''});added++;
    });
    closeSheet();refresh();switchView('home');
    setTimeout(()=>toast(`Imported ${added} transactions${skipped?` (${skipped} skipped)`:''}`),300);
  });
}
function normDate(s){
  if(!s)return new Date().toISOString().slice(0,10);
  s=s.trim();
  let m;
  if((m=s.match(/^(\d{4})-(\d{2})-(\d{2})/)))return `${m[1]}-${m[2]}-${m[3]}`;
  if((m=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/))){let[_,d,mo,y]=m;if(y.length===2)y='20'+y;return `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
  const dt=new Date(s);if(!isNaN(dt))return dt.toISOString().slice(0,10);
  return new Date().toISOString().slice(0,10);
}

/* ---------- connect a bank (live, via backend) ---------- */
async function openConnectSheet(){
  openSheet(`<h2>Connect a bank</h2><p class="sub">Link a bank to pull transactions automatically. Your data stays on this device.</p><input class="field" id="bankQ" placeholder="Search your bank (e.g. Monzo)"><div id="bankList" style="margin-top:12px;max-height:46vh;overflow:auto"><p style="color:var(--slate);font-size:14px;padding:8px">Loading banks…</p></div><div class="msg warn" id="bankErr" style="display:none"></div>`);
  let banks=[];
  try{
    const r=await fetch('/api/banks'); const j=await r.json();
    banks=j.banks||[]; if(!banks.length) throw new Error('none');
  }catch(e){
    document.getElementById('bankList').innerHTML='';
    const err=document.getElementById('bankErr'); err.style.display='block';
    err.innerHTML='Live sync is not set up yet (the backend was not reachable). You can still <strong>Import a statement</strong> or <strong>Add manually</strong>. To enable live sync, deploy the API files and add your Enable Banking keys in Vercel.';
    return;
  }
  const render=(q)=>{
    const ql=(q||'').toLowerCase();
    let list=banks.filter(b=>!ql||b.name.toLowerCase().includes(ql)||(b.country||'').toLowerCase().includes(ql));
    list.sort((a,b)=>(b.country==='GB'?1:0)-(a.country==='GB'?1:0));
    list=list.slice(0,40);
    document.getElementById('bankList').innerHTML = list.length ? list.map(b=>`<button class="bank-row" data-n="${b.name.replace(/"/g,'&quot;')}" data-c="${b.country}" style="display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:1px solid var(--hairline);border-radius:13px;padding:13px;margin-bottom:8px;background:#fff;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;color:var(--ink)"><span class="ico" style="background:var(--ink);color:#fff;font-family:'Space Grotesk';font-weight:600">${b.name.slice(0,1)}</span><span style="flex:1">${b.name}<span style="display:block;font-weight:500;color:var(--slate);font-size:12px">${b.country}</span></span></button>`).join('') : '<p style="color:var(--slate);font-size:14px;padding:8px">No match. In sandbox, search for Nordea.</p>';
    document.querySelectorAll('.bank-row').forEach(x=>x.addEventListener('click',()=>connectBank(x.dataset.n,x.dataset.c)));
  };
  render('');
  document.getElementById('bankQ').addEventListener('input',e=>render(e.target.value));
}
async function connectBank(name,country){
  try{
    const r=await fetch(`/api/connect?name=${encodeURIComponent(name)}&country=${encodeURIComponent(country)}`);
    const j=await r.json();
    if(j.url) location.href=j.url;
    else alert('Could not start the connection:\n'+JSON.stringify(j.error||j,null,2));
  }catch(e){ alert('Network error: '+e.message); }
}
/* after returning from a bank, merge the synced transactions handed to us */
function checkImport(){
  let raw=null;
  try{ raw=localStorage.getItem('ledger_import'); }catch(e){}
  if(!raw) return;
  try{ localStorage.removeItem('ledger_import'); }catch(e){}
  try{
    const d=JSON.parse(raw); let added=0;
    (d.tx||[]).forEach(t=>{
      const amount=Number(t.amount); if(!amount||isNaN(amount)) return;
      const date=t.date||new Date().toISOString().slice(0,10);
      const desc=(t.desc||'Transaction');
      const key=date+'|'+amount.toFixed(2)+'|'+desc.toLowerCase();
      if(state.tx.some(x=>(x.date+'|'+x.amount.toFixed(2)+'|'+(x.desc||'').toLowerCase())===key)) return;
      state.tx.push({id:uid(),date,desc,account:t.account||d.bank||'Bank',amount,cat:''}); added++;
    });
    if(added) persist();
    setTimeout(()=>toast(`Synced ${added} transactions from ${d.bank||'your bank'}`),400);
  }catch(e){}
}

/* ---------- settings ---------- */
document.getElementById('settingsBtn').addEventListener('click',openSettings);
function openSettings(){
  openSheet(`<h2>Settings</h2><p class="sub">Manage your name, rules, and data.</p>
    <label class="fl">Your name</label><input class="field" id="setName" value="${(state.name||'').replace(/"/g,'&quot;')}">
    <button class="btn ghost" id="goRules">Edit category rules (${state.rules.length})</button>
    <button class="btn ghost" id="goExport">Export a backup (JSON)</button>
    <label class="fl">Restore a backup</label><input type="file" accept=".json" id="impJson" class="field" style="padding:11px">
    <button class="btn ghost danger" id="clearAll">Delete all data</button>`);
  document.getElementById('setName').addEventListener('change',e=>{state.name=e.target.value.trim()||'You';persist();applyGreeting();});
  document.getElementById('goRules').addEventListener('click',openRules);
  document.getElementById('goExport').addEventListener('click',exportBackup);
  document.getElementById('impJson').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{const d=JSON.parse(rd.result);if(d&&Array.isArray(d.tx)){state=Object.assign({name:'You',tx:[],rules:[],recurring:[]},d);persist();closeSheet();applyGreeting();switchView('home');toast('Backup restored');}else alert('That file does not look like a Ledger backup.');}catch(err){alert('Could not read that file.');}};rd.readAsText(f);});
  document.getElementById('clearAll').addEventListener('click',()=>{if(confirm('Delete ALL your transactions and rules? This cannot be undone.')){state={name:state.name,tx:[],rules:[],recurring:[]};persist();closeSheet();switchView('home');}});
}
function openRules(){
  openSheet(`<h2>Category rules</h2><p class="sub">If a description contains your text, it gets that category. These run before the built-in rules.</p>
    <div id="ruleList">${state.rules.map((r,i)=>`<div class="row"><div class="name" style="font-weight:500">"${r.pattern}" → <strong>${LABEL[r.category]}</strong></div><button class="delete-x" data-del="${i}">Remove</button></div>`).join('')||'<p style="color:var(--slate);font-size:13px;padding:6px">No custom rules yet — built-in ones still apply.</p>'}</div>
    <label class="fl">Text to match</label><input class="field" id="rulePat" placeholder="e.g. caffe">
    <label class="fl">Category</label><select class="field" id="ruleCat">${CATS.map(c=>`<option value="${c}">${LABEL[c]}</option>`).join('')}</select>
    <button class="btn" id="ruleAdd">Add rule</button>`);
  sheet.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{state.rules.splice(+b.dataset.del,1);persist();openRules();}));
  document.getElementById('ruleAdd').addEventListener('click',()=>{const p=document.getElementById('rulePat').value.trim().toLowerCase();if(!p){alert('Enter some text to match.');return;}state.rules.push({pattern:p,category:document.getElementById('ruleCat').value});persist();openRules();});
}
function exportBackup(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ledger-backup.json';a.click();}

/* ---------- alerts ---------- */
const panel=document.getElementById('panel');
function openPanel(){buildAlerts();panel.classList.add('show');scrim.classList.add('show');}
function closePanel(){panel.classList.remove('show');scrim.classList.remove('show');}
document.getElementById('alertsBtn').addEventListener('click',openPanel);
document.getElementById('closePanel').addEventListener('click',closePanel);
function upcomingBills(){const rec=detectRecurring();const today=new Date().getDate();return rec.filter(r=>r.day>=today&&r.day<=today+7);}
function updateAlertDot(){document.getElementById('alertDot').style.display=upcomingBills().length?'block':'none';}
function buildAlerts(){
  const up=upcomingBills();
  const big=state.tx.filter(t=>t.amount<0).sort((a,b)=>a.amount-b.amount).slice(0,3);
  const block=(title,items)=>items.length?`<div class="eyebrow" style="margin-left:2px">${title}</div>`+items:'';
  const upHtml=up.map(r=>`<div class="card" style="margin-bottom:10px"><div class="row" style="padding:0">${icoBox(r.cat)}<div class="name">${r.name}<div class="sub">Due on the ${r.day}${r.account?' · '+r.account:''}</div></div><div class="amt num">${fmt(r.amt)}</div></div></div>`).join('');
  const bigHtml=big.map(t=>`<div class="card" style="margin-bottom:10px"><div class="row" style="padding:0">${icoBox(categorize(t))}<div class="name">${t.desc}<div class="sub">${t.date||''} · ${t.account||''}</div></div><div class="amt num">${fmt(t.amount)}</div></div></div>`).join('');
  document.getElementById('alertList').innerHTML=(up.length||big.length)?(block('Bills due this week',upHtml)+block('Largest recent spends',bigHtml)):'<p style="color:var(--slate);font-size:14px;padding:8px;line-height:1.5">No alerts yet. Once you have transactions, upcoming bills and notable spends show here.</p>';
}

/* ---------- sample data ---------- */
function loadSample(){
  const today=new Date();const iso=(off)=>{const d=new Date(today);d.setDate(d.getDate()-off);return d.toISOString().slice(0,10);};
  const isoM=(mb,day)=>{const d=new Date(today.getFullYear(),today.getMonth()-mb,day);return d.toISOString().slice(0,10);};
  const S=[];const add=(date,desc,amount,account)=>S.push({id:uid(),date,desc,amount,account,cat:''});
  // this month
  add(iso(0),'Tesco Express',-8.40,'Monzo');add(iso(0),'Pret A Manger',-3.95,'Monzo');add(iso(1),'Sainsbury\'s',-41.27,'Lloyds');
  add(iso(1),'NARDSHIR Games royalties',640,'Revolut');add(iso(2),'Amazon',-72.49,'Aqua');add(iso(3),'Octopus Energy',-128,'Lloyds');
  add(iso(4),'Costa Coffee',-4.65,'Monzo');add(iso(5),'Monthly salary',3200,'Lloyds');add(iso(5),'Uniqlo',-89.90,'Virgin Money');
  add(iso(6),'Deliveroo',-23.10,'Monzo');add(iso(7),'Waitrose',-37.84,'Lloyds');add(iso(7),'Spotify',-11.99,'Monzo');
  add(iso(8),'Shell petrol',-54.20,'Lloyds');add(iso(9),'Netflix',-12.99,'Revolut');add(iso(10),'TfL travel',-31.50,'Revolut');
  // prior months for trend + recurring detection
  for(let mb=1;mb<=5;mb++){
    add(isoM(mb,5),'Monthly salary',3200,'Lloyds');add(isoM(mb,2),'NARDSHIR Games royalties',600+mb*10,'Revolut');
    add(isoM(mb,3),'Octopus Energy',-120-mb,'Lloyds');add(isoM(mb,18),'Netflix',-12.99,'Revolut');add(isoM(mb,18),'Spotify',-11.99,'Monzo');
    add(isoM(mb,7),'Sainsbury\'s',-40-mb,'Lloyds');add(isoM(mb,12),'Tesco Express',-25-mb,'Monzo');add(isoM(mb,20),'PureGym',-24.99,'Monzo');
    add(isoM(mb,15),'Amazon',-30-mb*3,'Aqua');add(isoM(mb,22),'Shell petrol',-50,'Lloyds');
  }
  state.tx=S;persist();applyGreeting();switchView('home');setTimeout(()=>toast('Loaded sample data — explore, then clear it in Settings'),300);
}

/* ---------- toast ---------- */
function toast(msg){const t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;left:50%;bottom:calc(110px + env(safe-area-inset-bottom));transform:translateX(-50%);background:#14161C;color:#fff;padding:12px 18px;border-radius:30px;font-size:14px;font-weight:600;z-index:90;box-shadow:0 10px 30px rgba(0,0,0,.25);max-width:90%;text-align:center';document.body.appendChild(t);setTimeout(()=>{t.style.transition='opacity .4s';t.style.opacity='0';setTimeout(()=>t.remove(),400);},2600);}

/* ---------- boot ---------- */
function applyGreeting(){const h=new Date().getHours();document.getElementById('greetEyebrow').textContent=h<12?'Good morning':h<18?'Good afternoon':'Good evening';document.getElementById('greetName').textContent=state.name||'You';}
applyGreeting();checkImport();updateAlertDot();buildHome();
</script>
